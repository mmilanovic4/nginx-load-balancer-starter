services:
  app:
    build: ./app
    environment:
      - PORT=3000
    expose:
      - "3000"
    # No fixed container_name and no host port mapping here on purpose:
    # both would break `docker compose up --scale app=N`.

  nginx:
    image: nginx:1.30-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - app
